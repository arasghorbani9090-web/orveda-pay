<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orveda Pay — Global Account Collection and Settlement Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04101F"/>
      <stop offset="0.55" stop-color="#071A35"/>
      <stop offset="1" stop-color="#0A2143"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1565FF"/>
      <stop offset="1" stop-color="#00C48C"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.85" cy="0.05" r="0.6">
      <stop offset="0" stop-color="#1565FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1565FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.05" cy="1" r="0.55">
      <stop offset="0" stop-color="#00C48C" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00C48C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#grid)"/>
  <rect width="1280" height="440" fill="url(#glowA)"/>
  <rect width="1280" height="440" fill="url(#glowB)"/>

  <!-- Brand mark + wordmark -->
  <g transform="translate(72,64)">
    <rect width="56" height="56" rx="16" fill="url(#mark)"/>
    <path d="M16 29 L25 38 L41 19" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">Orveda <tspan fill="#5E9CFF">Pay</tspan></text>
  </g>

  <!-- Concept pill -->
  <g transform="translate(1010,72)">
    <rect width="198" height="40" rx="20" fill="#C9A24B" fill-opacity="0.16" stroke="#C9A24B" stroke-opacity="0.5"/>
    <text x="99" y="26" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#E6CB86">CONCEPT · PROTOTYPE</text>
  </g>

  <!-- Headline -->
  <text x="72" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Global Account Collection</text>
  <text x="72" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-1" fill="url(#mark)">&amp; Settlement Platform</text>

  <!-- Subhead -->
  <text x="72" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#94AECF">A unified multi-currency treasury environment for global businesses — GCC-first.</text>

  <!-- Category chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#C9D6E8">
    <g transform="translate(72,366)">
      <rect width="220" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="18" y="22">Collect · Convert · Settle</text>
    </g>
    <g transform="translate(304,366)">
      <rect width="250" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="18" y="22">Multi-currency · Virtual accounts</text>
    </g>
    <g transform="translate(566,366)">
      <rect width="232" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="18" y="22">Treasury · FX · Reconciliation</text>
    </g>
  </g>
</svg>
